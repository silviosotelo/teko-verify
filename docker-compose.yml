# Teko Verify — stack on-prem (server 34). Red interna privada; solo el
# servicio node publica puerto al host. PostgreSQL propio y dedicado.
services:
  teko-verify:
    build:
      context: .
      dockerfile: Dockerfile
    image: teko-verify:latest
    restart: unless-stopped
    ports:
      - "4400:4400"
    environment:
      PORT: "4400"
      DATABASE_URL: "postgres://teko:teko@postgres:5432/teko"
      OCR_SIDECAR_URL: "http://paddleocr-sidecar:8001"
      TEKO_DETECTOR_MODEL: "/app/models/scrfd_10g_bnkps.onnx"
      TEKO_RECOGNIZER_MODEL: "/app/models/recognizer.onnx"
      TEKO_PAD_MODEL: "/app/models/pad_minifasnet.onnx"
      TEKO_PAD_MODEL_2: "/app/models/pad_minifasnet_v1se_4_0.onnx"
      TEKO_GLASSES_MODEL: "/app/models/face_attrib_net.onnx"
      TOKEN_TTL_MIN: "15"
      MATCH_THRESHOLD: "0.40"
      # Calibración interina 2026-06-17 (ver docs/liveness-calibration.md): 0.70 → 0.60
      # para no falso-rechazar genuinos (piso genuino 0.6867 vs spoofs ≤0.3166).
      LIVENESS_THRESHOLD: "0.60"
      GLASSES_MAX: "0.50"
      # Base pública para construir el verificationUrl (se ajusta al dominio del túnel).
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-https://teko.rohekawebservices.online}"
      # Operador admin bootstrap (se crea al arrancar si admin_operators está vacía).
      TEKO_ADMIN_BOOTSTRAP_USER: "admin"
      TEKO_ADMIN_BOOTSTRAP_PASSWORD: "TekoAdmin2026!"
      # Evidencia: alinear con el volumen teko-evidence (montado en /data/evidence).
      # Sin esto el default /data/teko/evidence cae en la capa efímera y se pierde en cada rebuild.
      TEKO_EVIDENCE_DIR: "/data/evidence"
      # Logo de marca (white-label P1 #5): bajo el MISMO volumen persistido que la
      # evidencia, para que el logo no caiga en la capa efímera (se perdería en rebuild).
      TEKO_BRANDING_DIR: "/data/evidence/branding"
      # SMTP (Office365) para el envío nativo del link de verificación por email.
      # Los VALORES (incl. SMTP_PASSWORD) viven SOLO en el .env junto al compose del
      # server (NO se commitean): aquí sólo se referencian las vars. Si faltan, el
      # mailer queda "no configurado" y el envío es no-op (fail-open).
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Teko Verify}"
    volumes:
      # Modelos ONNX montados desde el host (no se hornean en la imagen).
      - ./models:/app/models:ro
      # SPA de captura (HTML autocontenido), iterable sin rebuild.
      - ./web/dist:/app/web/dist:ro
      # Dashboard admin compilado (Vite), iterable sin rebuild. ADMIN_DIST=/app/admin/dist.
      - ./admin/dist:/app/admin/dist:ro
      # Migraciones disponibles para `npm run migrate` (no se hornean en la imagen).
      - ./migrations:/app/migrations:ro
      # Evidencia en disco (patrón v9) + job de retención.
      - teko-evidence:/data/evidence
    depends_on:
      postgres:
        condition: service_healthy
      paddleocr-sidecar:
        condition: service_started

  paddleocr-sidecar:
    build:
      context: .
      dockerfile: Dockerfile.ocr
    image: teko-verify-ocr:latest
    restart: unless-stopped
    # Sin "ports": solo accesible en la red interna por teko-verify.
    expose:
      - "8001"
    volumes:
      # Código del sidecar iterable sin rebuild (pip layers cacheadas).
      - ./ocr:/app/ocr:ro

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: teko
      POSTGRES_PASSWORD: teko
      POSTGRES_DB: teko
    volumes:
      - teko-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teko -d teko"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  teko-pgdata:
  teko-evidence:
