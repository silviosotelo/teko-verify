<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Teko · Verificación de identidad</title>
<style>
  :root{--bg:#0e1116;--card:#171c24;--fg:#e8edf3;--muted:#9aa7b5;--accent:#22c55e;--accent2:#16a34a;--err:#ef4444;--line:#283040}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:20px}
  header{display:flex;align-items:center;gap:10px;padding:8px 0 16px}
  .logo{font-weight:800;letter-spacing:3px;font-size:20px}
  .logo b{color:var(--accent)}
  .sub{color:var(--muted);font-size:12px;margin-top:-2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;flex:1;display:flex;flex-direction:column}
  h1{font-size:19px;margin:0 0 6px}
  p{color:var(--muted);font-size:14px;line-height:1.5}
  .steps{display:flex;gap:6px;margin-bottom:16px}
  .dot{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .dot.on{background:var(--accent)}
  .frame{position:relative;width:100%;aspect-ratio:3/4;background:#000;border-radius:14px;overflow:hidden;margin:8px 0}
  .frame.doc{aspect-ratio:1.586/1}
  video,canvas{width:100%;height:100%;object-fit:cover;display:block}
  .oval{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .oval::before{content:"";width:62%;height:78%;border:3px dashed rgba(255,255,255,.55);border-radius:50%}
  .docguide{position:absolute;inset:10%;border:3px dashed rgba(255,255,255,.55);border-radius:10px;pointer-events:none}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:#fff;font-size:13px;text-shadow:0 1px 3px #000}
  button{appearance:none;border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:700;width:100%;cursor:pointer;margin-top:auto}
  .primary{background:var(--accent);color:#04210f}.primary:active{background:var(--accent2)}
  .ghost{background:transparent;color:var(--muted);border:1px solid var(--line);margin-top:10px}
  .consent{background:#0b0f14;border:1px solid var(--line);border-radius:10px;padding:14px;font-size:13px;color:var(--muted);max-height:180px;overflow:auto;margin:10px 0}
  label.chk{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--fg);margin:10px 0}
  .center{text-align:center;margin:auto 0;display:flex;flex-direction:column;align-items:center;gap:10px}
  .spin{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .big{font-size:48px}
  .ok{color:var(--accent)}.bad{color:var(--err)}
  .reasons{list-style:none;padding:0;margin:10px 0;font-size:13px;color:var(--muted)}
  .reasons li{padding:6px 0;border-top:1px solid var(--line)}
  .notice{background:#2a1a12;border:1px solid #7c4a2a;color:#ffd9b0;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.4;margin:4px 0 6px}
  footer{color:var(--muted);font-size:11px;text-align:center;padding-top:14px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="logo">T<b>E</b>KO</div>
      <div class="sub">identidad verificada</div>
    </div>
  </header>
  <div class="steps" id="steps"></div>
  <div class="card" id="card"></div>
  <footer>Tus datos se tratan solo para verificar tu identidad · Ley N° 7593/2025</footer>
</div>

<script>
"use strict";
const TOKEN = location.pathname.split("/").filter(Boolean).pop();
const card = document.getElementById("card");
const stepsEl = document.getElementById("steps");
const STEPS = ["Consentimiento","Selfie","Cédula (frente)","Cédula (dorso)","Verificación"];
let stepIdx = 0;
let stream = null;

function steps(i){ stepsEl.innerHTML = STEPS.map((_,k)=>`<div class="dot ${k<=i?"on":""}"></div>`).join(""); }
function stopCam(){ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } }
async function api(path, body){
  const r = await fetch(`/verify/${TOKEN}${path}`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});
  let j={}; try{ j=await r.json(); }catch(e){}
  if(!r.ok) throw new Error(j.error||("HTTP "+r.status));
  return j;
}
async function openCam(facing){
  stopCam();
  // Autoenfoque continuo (best-effort: algunos navegadores lo ignoran) + mayor
  // resolución ideal (mejor OCR de la cédula). focusMode va directo y también en
  // advanced[] porque distintos navegadores lo leen de un lado o del otro.
  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080},focusMode:"continuous",advanced:[{focusMode:"continuous"}]},
    audio:false
  });
  // Reintento explícito de autoenfoque sobre el track (sobre todo para la cámara
  // trasera al fotografiar la cédula). try/catch: no rompe si no se soporta.
  const track = stream.getVideoTracks()[0];
  try{ await track.applyConstraints({advanced:[{focusMode:"continuous"}]}); }catch(e){ /* el browser no soporta focusMode: seguimos igual */ }
  const v=document.getElementById("cam"); v.srcObject=stream; await v.play();
}
function grab(){
  const v=document.getElementById("cam");
  const c=document.createElement("canvas"); c.width=v.videoWidth||1280; c.height=v.videoHeight||960;
  c.getContext("2d").drawImage(v,0,0,c.width,c.height);
  return c.toDataURL("image/jpeg",0.9);
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ---------- Pantalla: Consentimiento ----------
function viewConsent(){
  steps(0); stepIdx=0;
  card.innerHTML = `
    <h1>Verifiquemos tu identidad</h1>
    <p>Vamos a sacarte una selfie y una foto de tu cédula. Te toma menos de un minuto.</p>
    <div class="consent">Autorizo el tratamiento de mis datos biométricos (rostro) y de mi documento con la única finalidad de verificar mi identidad, conforme a la Ley N° 7593/2025 de Protección de Datos Personales de la República del Paraguay.</div>
    <label class="chk"><input type="checkbox" id="agree"><span>Leí y acepto el tratamiento de mis datos para verificar mi identidad.</span></label>
    <button class="primary" id="go" disabled>Continuar</button>`;
  const agree=document.getElementById("agree"), go=document.getElementById("go");
  agree.onchange=()=>go.disabled=!agree.checked;
  go.onclick=async()=>{ go.disabled=true; go.textContent="..."; try{ await api("/consent",{accepted:true,consentVersion:"1.0"}); viewSelfie(); }catch(e){ go.disabled=false; go.textContent="Continuar"; alert("No se pudo registrar el consentimiento: "+e.message); } };
}

// ---------- Mensajes amables para el pre-check de calidad de la selfie ----------
// Mapea las "reasons" reales que devuelve el módulo quality (ver src/modules/quality.ts)
// a un texto claro y humano. Las reasons NO accionables por el usuario
// (modelo de anteojos ausente, error interno) NO bloquean: dejamos pasar y el
// pipeline en /submit sigue siendo la autoridad.
const QUALITY_MSG = {
  glasses: "Quitate los anteojos y volvé a intentar 🙂",
  blur: "La foto salió movida. Sostené firme el teléfono.",
  over_exposed: "Hay demasiada luz o reflejo. Probá en otro lugar.",
  low_light: "Necesitamos un poco más de luz.",
  off_pose: "Mirá de frente a la cámara.",
  no_face: "No detectamos bien tu rostro. Centralo en el óvalo.",
  align_failed: "No detectamos bien tu rostro. Centralo en el óvalo."
};
// Reasons que el usuario NO puede corregir → no tiene sentido bloquearlo acá.
const QUALITY_NON_ACTIONABLE = ["glasses_model_unavailable", "quality_error"];

// Decide si la calidad permite avanzar y, si no, qué mensaje mostrar.
function evalQuality(quality){
  if(!quality || quality.passed) return { advance:true };
  const reasons = Array.isArray(quality.reasons) ? quality.reasons : [];
  // Si TODO lo que falló es no accionable, dejamos avanzar (no atrapamos al usuario).
  const actionable = reasons.filter(r=>!QUALITY_NON_ACTIONABLE.includes(r));
  if(actionable.length===0) return { advance:true };
  const msg = QUALITY_MSG[actionable[0]] || "Probá sacarte la selfie de nuevo, con buena luz y de frente.";
  return { advance:false, msg };
}

// ---------- Pantalla: Selfie (con frames para liveness) ----------
function viewSelfie(notice){
  steps(1); stepIdx=1;
  const banner = notice ? `<div class="notice">${notice}</div>` : "";
  card.innerHTML = `
    <h1>Sacate una selfie</h1>
    <p>Ubicá tu rostro dentro del óvalo, con buena luz, de frente y sin anteojos.</p>
    ${banner}
    <div class="frame"><video id="cam" autoplay playsinline muted></video><div class="oval"></div><div class="hint">Mirá a la cámara</div></div>
    <button class="primary" id="cap">Sacar selfie</button>
    <button class="ghost" id="retry">Reintentar cámara</button>`;
  const cap=document.getElementById("cap");
  document.getElementById("retry").onclick=()=>openCam("user").catch(e=>alert("Cámara: "+e.message));
  openCam("user").catch(e=>alert("No se pudo abrir la cámara: "+e.message+"\\nRevisá los permisos del navegador."));
  cap.onclick=async()=>{
    cap.disabled=true; cap.textContent="Revisando tu foto…";
    try{
      // selfie + 2 frames con micro-pausa (para PAD/desafío activo).
      const selfie=grab(); await sleep(350); const f1=grab(); await sleep(350); const f2=grab();
      stopCam();
      const resp=await api("/selfie",{image:selfie,frames:[f1,f2]});
      // Pre-check de calidad AL MOMENTO de capturar: si no pasa por algo que el
      // usuario puede corregir, NO avanzamos; le pedimos repetir con un tip claro.
      const v=evalQuality(resp.quality);
      if(v.advance){ viewDoc("front"); }
      else { viewSelfie(v.msg); }  // re-render: reabre la cámara y muestra el aviso
    }catch(e){ cap.disabled=false; cap.textContent="Sacar selfie"; alert("No pudimos procesar la selfie: "+e.message); }
  };
}

// ---------- Mensajes amables para el pre-check de la cédula (doc-check) ----------
// Mapea las "reasons" del endpoint /doc-check (ver src/api/capture.ts) a texto claro.
const DOC_MSG = {
  blurry: "La cédula salió borrosa. Acercala un poco y mantené firme el teléfono.",
  no_doc_face: "No se ve bien el frente de la cédula. Que entre completa, con la foto visible.",
  mrz_unreadable: "No podemos leer el dorso. Que se vean las líneas de abajo, sin reflejos."
};
function docMsg(reasons){
  const r = Array.isArray(reasons) ? reasons : [];
  for(const k of r){ if(DOC_MSG[k]) return DOC_MSG[k]; }
  return "Probá la foto de la cédula de nuevo, enfocada y sin reflejos.";
}

// ---------- Pantalla: Cédula frente/dorso ----------
let docFront=null;
function viewDoc(side, notice){
  const front = side==="front";
  steps(front?2:3); stepIdx=front?2:3;
  const banner = notice ? `<div class="notice">${notice}</div>` : "";
  card.innerHTML = `
    <h1>Cédula — ${front?"frente":"dorso"}</h1>
    <p>${front?"Mostranos el frente de tu cédula, con la foto y los datos bien visibles.":"Ahora el dorso: que se vean las líneas (MRZ) y el código de barras."}</p>
    ${banner}
    <div class="frame doc"><video id="cam" autoplay playsinline muted></video><div class="docguide"></div><div class="hint">Que entre completa y sin reflejos</div></div>
    <button class="primary" id="cap">Sacar foto del ${front?"frente":"dorso"}</button>`;
  openCam({exact:"environment"}).catch(()=>openCam("environment").catch(e=>alert("Cámara: "+e.message)));
  document.getElementById("cap").onclick=async()=>{
    const btn=document.getElementById("cap"); btn.disabled=true; btn.textContent="Revisando la foto…";
    const img=grab();
    // Pre-check INFORMATIVO de la cédula ANTES de avanzar: si no pasa por algo
    // corregible, NO avanzamos; pedimos recapturar con un tip claro. El doc-check
    // no rompe el flujo: si el endpoint falla, dejamos avanzar (el pipeline manda).
    let check={passed:true,reasons:[]};
    try{ check=await api("/doc-check",{image:img,side}); }catch(e){ check={passed:true,reasons:[]}; }
    if(!check.passed){
      stopCam();
      viewDoc(side, docMsg(check.reasons));  // re-render: reabre cámara + aviso
      return;
    }
    if(front){ docFront=img; stopCam(); viewDoc("back"); return; }
    stopCam();
    try{ await api("/document",{front:docFront,back:img}); viewProcessing(); }
    catch(e){ btn.disabled=false; btn.textContent="Sacar foto del dorso"; alert("No pudimos subir la foto: "+e.message); }
  };
}

// ---------- Pantalla: Procesando + resultado ----------
async function viewProcessing(){
  steps(4); stepIdx=4;
  card.innerHTML = `<div class="center"><div class="spin"></div><h1>Verificando tu identidad…</h1><p>Estamos comprobando tus fotos. Esto tarda unos segundos, no cierres esta pantalla.</p></div>`;
  try{ await api("/submit",{}); }catch(e){ /* puede ya estar processing */ }
  // Polling de estado (fallback robusto al SSE por el buffering del túnel §11).
  for(let i=0;i<60;i++){
    await sleep(2000);
    let s; try{ s=await (await fetch(`/verify/${TOKEN}/status`)).json(); }catch(e){ continue; }
    if(["verified","rejected","needs_recapture","error","expired"].includes(s.state)){ return viewResult(s); }
  }
  viewResult({state:"error"});
}
function viewResult(s){
  stopCam();
  const map={
    verified:{i:"✓",c:"ok",t:"¡Identidad verificada!",d:"Listo, confirmamos que sos vos. Gracias."},
    rejected:{i:"✕",c:"bad",t:"No pudimos verificarte",d:"Tus datos no pasaron los controles. Si creés que es un error, contactá a quien te envió el enlace."},
    needs_recapture:{i:"↻",c:"",t:"Repitamos las fotos",d:"Necesitamos imágenes un poco más nítidas para confirmar tu identidad."},
    error:{i:"!",c:"bad",t:"Ocurrió un problema",d:"Algo falló de nuestro lado. Probá de nuevo en unos minutos."},
    expired:{i:"⏱",c:"bad",t:"El enlace expiró",d:"Por seguridad este enlace caducó. Pedí uno nuevo para volver a intentar."}
  };
  const m=map[s.state]||map.error;
  // Traducimos los códigos de reasons a mensajes amables (mismo mapa que el pre-check).
  const friendly=(s.reasons&&s.reasons.length)
    ? s.reasons.filter(r=>!QUALITY_NON_ACTIONABLE.includes(r)).map(r=>QUALITY_MSG[r]||"Repetí la foto con buena luz y de frente.")
    : [];
  const tips=[...new Set(friendly)];
  card.innerHTML = `<div class="center">
    <div class="big ${m.c}">${m.i}</div><h1>${m.t}</h1><p>${m.d}</p>
    ${tips.length?`<ul class="reasons">${tips.map(t=>`<li>${t}</li>`).join("")}</ul>`:""}
    ${s.state==="needs_recapture"?`<button class="primary" id="again">Volver a intentar</button>`:""}
  </div>`;
  if(s.state==="needs_recapture"){ document.getElementById("again").onclick=()=>viewSelfie(); }
  if(s.redirectUrl){ setTimeout(()=>{ location.href=s.redirectUrl; }, 2500); }
}

if(!TOKEN){ card.innerHTML="<h1>Enlace inválido</h1><p>Falta el token de verificación.</p>"; }
else { viewConsent(); }
</script>
</body>
</html>
